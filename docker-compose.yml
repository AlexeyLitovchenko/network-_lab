version: '3.8'

services:
  frontend:
    build: ./frontend
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend-net

  api:
    build: ./api
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./api:/app:ro
    networks:
      - frontend-net
      - backend-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "supersecret"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: users
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend-net

secrets:
  db_password:
    file: ./secrets/db_password.txt

networks:
  frontend-net:
    driver: bridge

  backend-net:
    driver: bridge
    internal: true